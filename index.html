<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AI Running Coach — Workout Library</title>
<style>
:root{
  --blue:#011B50; --green:#B9C930; --gray:#D3D3D3; --ink:#222222; --white:#FFFFFF;
  --gray-soft:#ECECEC; --gray-line:#D3D3D3;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--white);color:var(--ink);line-height:1.5;}

/* ---------- HEADER ---------- */
.banner{background:var(--blue);color:#fff;padding:34px 24px 30px;}
.banner-inner{max-width:1080px;margin:0 auto;}
.brand-row{display:flex;align-items:center;gap:14px;}
.logo-mark{width:46px;height:46px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark svg{width:28px;height:28px;display:block}
.banner h1{font-size:1.85rem;font-weight:800;letter-spacing:-.5px;line-height:1.1;}
.banner .sub{font-size:.92rem;opacity:.72;margin-top:3px;font-weight:500}
.acid-rule{height:4px;width:64px;background:var(--green);border-radius:3px;margin-top:18px;}

/* ---------- MODE PICKER ---------- */
#mode-screen{transition:opacity .25s ease;}
#mode-screen.hiding{opacity:0;pointer-events:none;}
.mode-wrap{max-width:700px;margin:0 auto;padding:52px 24px 60px;text-align:center;}
.mode-heading{color:var(--blue);font-size:1.5rem;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;}
.mode-sub-head{font-size:.95rem;opacity:.55;font-weight:500;margin-bottom:40px;}
.mode-choices{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.mode-btn{display:flex;flex-direction:column;align-items:flex-start;background:#fff;border:2px solid var(--gray-line);border-radius:20px;padding:28px 26px 24px;cursor:pointer;font-family:inherit;text-align:left;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;position:relative;overflow:hidden;}
.mode-btn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;}
.mode-btn.mode-int::before{background:var(--green);}
.mode-btn.mode-long::before{background:var(--blue);}
.mode-btn:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(1,27,80,.15);border-color:var(--blue);}
.mode-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex-shrink:0;}
.mode-int .mode-icon{background:var(--green);}
.mode-long .mode-icon{background:var(--blue);}
.mode-icon svg{width:26px;height:26px;display:block;}
.mode-label{font-size:1.3rem;font-weight:800;color:var(--blue);letter-spacing:-.3px;margin-bottom:5px;}
.mode-count{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.5;margin-bottom:10px;}
.mode-desc{font-size:.84rem;opacity:.65;line-height:1.45;}
.mode-arrow{display:flex;align-items:center;gap:5px;margin-top:20px;font-size:.8rem;font-weight:800;color:var(--blue);}
.mode-arrow svg{width:14px;height:14px;}

@media (max-width:520px){
  .mode-choices{grid-template-columns:1fr;}
  .mode-wrap{padding:36px 18px 48px;}
  .mode-heading{font-size:1.25rem;}
}

/* ---------- LIBRARY (hidden until mode picked) ---------- */
#library{display:none;opacity:0;transition:opacity .25s ease;}
#library.visible{opacity:1;}

/* ---------- LAYOUT ---------- */
.wrap{max-width:1080px;margin:0 auto;padding:26px 24px 60px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin:34px 0 4px;}
.section-head:first-child{margin-top:0}
.section-head h2{color:var(--blue);font-size:1.18rem;font-weight:800;letter-spacing:-.2px;}
.section-head .count{color:var(--ink);opacity:.5;font-size:.82rem;font-weight:600}
.section-rule{height:3px;background:var(--green);border-radius:2px;width:100%;margin-bottom:20px;}

/* ---------- STAT TILES ---------- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:8px;}
.stat{background:var(--gray-soft);border-radius:14px;padding:16px 18px;border-left:5px solid var(--green);}
.stat .v{font-size:1.7rem;font-weight:800;color:var(--blue);letter-spacing:-.5px;line-height:1.05;}
.stat .l{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;opacity:.55;margin-top:5px;}
.stat .x{font-size:.74rem;opacity:.6;margin-top:2px}

/* ---------- CONTROLS ---------- */
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:22px;}
.search{flex:1 1 220px;position:relative;}
.search input{width:100%;padding:11px 14px 11px 38px;border:2px solid var(--gray-line);border-radius:11px;font-size:.92rem;color:var(--ink);background:#fff;outline:none;font-family:inherit;}
.search input:focus{border-color:var(--blue);}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;opacity:.4}
.segbtns{display:flex;gap:0;border:2px solid var(--gray-line);border-radius:11px;overflow:hidden;}
.segbtns button{border:none;background:#fff;color:var(--ink);padding:10px 15px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;}
.segbtns button.on{background:var(--blue);color:#fff;}
.segbtns button:not(:last-child){border-right:2px solid var(--gray-line);}
select.sort{padding:10px 13px;border:2px solid var(--gray-line);border-radius:11px;font-size:.85rem;font-weight:700;color:var(--ink);background:#fff;cursor:pointer;font-family:inherit;outline:none}
select.sort:focus{border-color:var(--blue)}
.change-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;border:2px solid var(--gray-line);border-radius:11px;background:#fff;color:var(--ink);font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.change-btn:hover{border-color:var(--blue);color:var(--blue);}
.change-btn svg{width:14px;height:14px;opacity:.6;}

/* ---------- CARDS ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}
.card{display:flex;flex-direction:column;text-decoration:none;color:inherit;background:#fff;border:1.5px solid var(--gray-line);border-radius:16px;padding:18px;transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease;position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--green);}
.card.long::before{background:var(--blue);}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(1,27,80,.14);border-color:var(--blue);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;padding-left:6px;}
.dur{font-size:1.9rem;font-weight:800;color:var(--blue);letter-spacing:-1px;line-height:1;}
.dur span{font-size:.8rem;font-weight:700;opacity:.5;margin-left:1px}
.tag{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:5px 9px;border-radius:20px;white-space:nowrap;}
.tag.pct{background:var(--green);color:var(--blue);}
.tag.lr{background:var(--blue);color:#fff;}
.card .meta{font-size:.82rem;opacity:.62;padding-left:6px;min-height:2.4em;}
.card .tagline{font-size:.84rem;font-style:italic;opacity:.78;padding-left:6px;margin-top:9px;}

/* intensity bar */
.ibar{display:flex;height:8px;border-radius:5px;overflow:hidden;margin:14px 0 8px;margin-left:6px;background:var(--gray);}
.ibar i{height:100%}
.seg-easy{background:var(--gray);} .seg-hard{background:var(--green);} .seg-allout{background:var(--blue);}
.long .seg-hard{background:var(--blue);} .long .seg-allout{background:var(--green);}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding-left:6px;font-size:.7rem;opacity:.6;margin-top:2px;}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block}

.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;padding-left:6px;border-top:1px solid var(--gray-soft);}
.foot-stats{font-size:.74rem;font-weight:700;opacity:.55;}
.open{font-size:.74rem;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:4px;}
.open svg{width:13px;height:13px}

.empty{text-align:center;padding:50px 20px;opacity:.5;font-weight:600;display:none;}

/* ---------- FOOTER ---------- */
.foot{max-width:1080px;margin:0 auto;padding:0 24px;}
.foot-bar{background:var(--blue);color:#fff;border-radius:14px;padding:16px 20px;font-size:.78rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.foot-bar .acc{color:var(--green);font-weight:800}

@media (max-width:560px){
  .banner h1{font-size:1.5rem}
  .dur{font-size:1.7rem}
}
</style>
</head>

        <div class="mode-arrow">Pick a workout
          <svg viewBox="0 0 24 24" fill="none" stroke="#011B50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
        </div>

            <path d="M3 12c0-4.97 4.03-9 9-9s9 4.03 9 9-4.03 9-9 9"/>

          </svg>
        </div>
        <div class="mode-label">Long Run</div>
        <div class="mode-count">20 workouts · 10–60 min</div>
        <div class="mode-desc">Run/walk structure, steady pace, increasing distance. Build your aerobic base.</div>
        <div class="mode-arrow">Pick a workout
          <svg viewBox="0 0 24 24" fill="none" stroke="#011B50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
        </div>
      </button>

    </div>
  </div>
</div>

<!-- ── LIBRARY ─────────────────────────────────────────────────────────────── -->
<div id="library">
<div class="wrap">

  <div class="section-head"><h2>Overview</h2><span class="count">2026-05-24 – 2026-05-25</span></div>
  <div class="section-rule"></div>
  <div class="stats" id="stats"></div>

  <div class="section-head"><h2>Workouts</h2><span class="count" id="shown"></span></div>
  <div class="section-rule"></div>

  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="Search workouts…">
    </div>
    <div class="segbtns" id="filter">
      <button data-f="all">All</button>
      <button data-f="int">Intervals</button>
      <button data-f="long">Long Runs</button>
    </div>
    <select class="sort" id="sort">
      <option value="dur-desc">Longest first</option>
      <option value="dur-asc">Shortest first</option>
      <option value="int-desc">Hardest first</option>
      <option value="int-asc">Easiest first</option>
      <option value="date-desc">Newest first</option>
    </select>
    <button class="change-btn" id="changeType">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Change type
    </button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">No workouts match your filters.</div>

</div>

<div class="foot">
  <div class="foot-bar">
    <span>Tap any card to open the workout — bell &amp; voice coaching, Spotify keeps playing.</span>
    <span><span class="acc">45</span> sessions ready</span>
  </div>
</div>
</div><!-- /#library -->

const STATS = {"n": 45, "total_time": "18h 30m", "total_min": 1110, "n_int": 25, "n_long": 20, "dur_min": 10, "dur_max": 60, "pct_min": 40, "pct_max": 90};

// ---- overview tiles ----
const tiles = [
  {v: STATS.n, l:"Total Sessions", x: STATS.n_int+" intervals · "+STATS.n_long+" long runs"},
  {v: STATS.total_time, l:"Programmed Time", x: STATS.total_min+" minutes of coaching"},
  {v: STATS.dur_min+"–"+STATS.dur_max+"m", l:"Duration Range", x:"per session"},
  {v: STATS.pct_min+"–"+STATS.pct_max+"%", l:"Intensity Range", x:"interval sessions"},
];
document.getElementById('stats').innerHTML = tiles.map(t=>
  `<div class="stat"><div class="v">${t.v}</div><div class="l">${t.l}</div><div class="x">${t.x}</div></div>`).join('');

const enc = s => encodeURIComponent(s).replace(/%2F/g,'/');
const grid = document.getElementById('grid');
const fmtDate = d => { if(!d) return ''; const dt=new Date(d+'T00:00'); return dt.toLocaleDateString('en-NZ',{day:'numeric',month:'short'}); };

function bar(r){
  const by = r.by_type_sec||{}; const tot = r.total_sec||1;
  const easy=(by.easy||0)+(by.moderate||0), hard=by.hard||0, allout=by.allout||0;
  const pct = x => (x/tot*100).toFixed(1)+'%';
  return `<div class="ibar">
    <i class="seg-easy" style="width:${pct(easy)}"></i>
    <i class="seg-hard" style="width:${pct(hard)}"></i>
    <i class="seg-allout" style="width:${pct(allout)}"></i></div>`;
}

function card(r){
  const long = r.is_long_run;
  const tag = long ? `<span class="tag lr">Long Run</span>`
                   : `<span class="tag pct">${r.intensity}</span>`;
  const easyLbl = long ? 'Walk' : 'Easy';
  const hardLbl = long ? 'Run' : 'Hard';
  const aoLbl = long ? '' : 'Sprint';
  const legend = `<div class="legend">
     <span><i class="seg-easy"></i>${easyLbl}</span>
     <span><i class="seg-hard"></i>${hardLbl}</span>
     ${aoLbl?`<span><i class="seg-allout"></i>${aoLbl}</span>`:''}</div>`;
  const work = r.work_pct!=null ? r.work_pct+'% work' : '';
  return `<a class="card ${long?'long':''}" href="${enc(r.file)}">
    <div class="card-top">
      <div class="dur">${r.duration_min}<span>min</span></div>
      ${tag}
    </div>
    <div class="meta">${r.meta||''}</div>
    ${bar(r)}
    ${legend}
    <div class="tagline">"${(r.done_sub||'').replace(/"/g,'')}"</div>
    <div class="card-foot">
      <span class="foot-stats">${r.n_intervals} intervals · ${work}</span>
      <span class="open">Open
        <svg viewBox="0 0 24 24" fill="none" stroke="#011B50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
      </span>
    </div>
  </a>`;
}

let curFilter='all', curQ='';

function setFilter(f){
  curFilter=f;
  [...document.getElementById('filter').children].forEach(b=>{
    b.classList.toggle('on', b.dataset.f===f);
  });
}

function apply(){
  let list = RUNS.slice();
  if(curFilter==='int') list=list.filter(r=>!r.is_long_run);
  if(curFilter==='long') list=list.filter(r=>r.is_long_run);
  if(curQ){ const q=curQ.toLowerCase();
    list=list.filter(r=>((r.title||'')+' '+(r.meta||'')+' '+(r.intensity||'')+' '+(r.done_sub||'')).toLowerCase().includes(q)); }
  const s=document.getElementById('sort').value;
  const cmp={
    'dur-desc':(a,b)=>b.duration_min-a.duration_min,
    'dur-asc':(a,b)=>a.duration_min-b.duration_min,
    'int-desc':(a,b)=>(b.work_pct||0)-(a.work_pct||0),
    'int-asc':(a,b)=>(a.work_pct||0)-(b.work_pct||0),
    'date-desc':(a,b)=>(b.date||'').localeCompare(a.date||'')||b.duration_min-a.duration_min,
  }[s];
  list.sort(cmp);
  grid.innerHTML=list.map(card).join('');
  document.getElementById('empty').style.display=list.length?'none':'block';
  document.getElementById('shown').textContent=list.length+' shown';
}

function showLibrary(f){
  const modeScreen = document.getElementById('mode-screen');
  const library = document.getElementById('library');
  setFilter(f);
  apply();
  modeScreen.classList.add('hiding');
  library.style.display='block';
  requestAnimationFrame(()=>{ library.classList.add('visible'); });
  setTimeout(()=>{ modeScreen.style.display='none'; }, 260);
}

function showModePicker(){
  const modeScreen = document.getElementById('mode-screen');
  const library = document.getElementById('library');
  library.classList.remove('visible');
  setTimeout(()=>{
    library.style.display='none';
    modeScreen.style.display='block';
    modeScreen.classList.remove('hiding');
  }, 260);
}

// Mode picker buttons
document.getElementById('mode-screen').addEventListener('click', e=>{
  const btn = e.target.closest('.mode-btn');
  if(!btn) return;
  showLibrary(btn.dataset.f);
});

// Filter segbtns (inside library)
document.getElementById('filter').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  setFilter(b.dataset.f); apply();
});
